# Local self-host / evaluation stack: the OTA server + Postgres + MinIO (an S3-compatible bucket).
# Fill SWD_IDS_VERIFY_* with your OpenMV OTA-verify token, then:  docker compose up --build
services:
  ota:
    build:
      context: ../../../..
      dockerfile: src/openmv_ota/server/deploy/Dockerfile
    ports:
      - "8080:8080"
    environment:
      OPENMV_OTA_BASE_URL: http://localhost:8080
      DATABASE_URL: postgresql://ota:ota@db:5432/ota
      OPENMV_OTA_STORAGE_BACKEND: s3
      OPENMV_OTA_S3_BUCKET: ota
      OPENMV_OTA_S3_ENDPOINT_URL: http://minio:9000
      OPENMV_OTA_S3_REGION: us-east-1
      OPENMV_OTA_S3_ACCESS_KEY_ID: minioadmin
      OPENMV_OTA_S3_SECRET_ACCESS_KEY: minioadmin
      OPENMV_OTA_SWD_IDS_VERIFY_URL: ${SWD_IDS_VERIFY_URL:?set your OpenMV OTA-verify URL}
      OPENMV_OTA_SWD_IDS_VERIFY_TOKEN: ${SWD_IDS_VERIFY_TOKEN:?set your OpenMV OTA-verify token}
      OPENMV_OTA_ADMIN_BOOTSTRAP_TOKEN: ${ADMIN_BOOTSTRAP_TOKEN:-dev-admin-token}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ota
      POSTGRES_PASSWORD: ota
      POSTGRES_DB: ota
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ota"]
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - ota-db:/var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - ota-blobs:/data

  # One-shot: create the bucket the server writes to.
  createbucket:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "mc alias set local http://minio:9000 minioadmin minioadmin &&
             mc mb --ignore-existing local/ota"

volumes:
  ota-db:
  ota-blobs:
