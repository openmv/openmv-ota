name: HIL OTA cycle

# The live-hardware OTA gate: provision a golden board from this ref, exercise an OTA
# SCENARIO (happy install/trial/confirm/promote, or a negative path -- corrupt, rollback,
# bad signature), and verify the device behaves, capturing the coverage markers off the
# board's P4/P5 UART. A second job folds the traces into a device-path coverage report --
# coverage on the lines the host suite structurally can't reach (they need real flash).
#
# Manual-trigger ONLY while the harness is in development -- it runs on the bench and each
# board cycle is minutes (the AE3's OSPI flash alone is ~10). This will become the required
# gate for OTA-touching PRs once the path matrix is built out.
on:
  workflow_dispatch:
    inputs:
      board:
        description: which board to run (or all)
        default: all
        type: choice
        options: [all, OPENMV_N6, OPENMV_AE3, OPENMV_RT1060]
      scenario:
        description: which OTA path to exercise
        default: delta
        type: choice
        # NOTE: corrupt/bad_sig tamper the server's artifact store, so they only run where the
        # harness is CO-LOCATED with the update server (the RT1060 bench node); pick that board.
        options: [delta, full, corrupt, rollback, bad_sig, bad_version, no_slot]
      target:
        description: update version to install over golden 1.0.0
        default: "1.1.0"

concurrency:
  group: hil-ota-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Resolve which board/network legs to run from the `board` input. A job-level `if` can't see
  # `matrix` (that context isn't available there -- it was an invalid-workflow error), and a
  # static matrix can't be filtered inline, so build the matrix here and feed it via fromJSON.
  plan:
    name: plan legs
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.f.outputs.matrix }}
    steps:
      - id: f
        env:
          BOARD: ${{ github.event.inputs.board }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json, os
          # The N6 and RT1062 have both interfaces, so each runs twice (lan + wifi). The RT1062
          # is the block-device (mimxrt) model, provisioned via blhost (machine.bootloader ->
          # resident SBL); its runner label is board-openmv-rt1062 (RT1062 silicon), as in ci.yml.
          legs = [
              {"board": "OPENMV_N6", "network": "lan", "label": "board-openmv-n6"},
              {"board": "OPENMV_N6", "network": "wifi", "label": "board-openmv-n6"},
              {"board": "OPENMV_AE3", "network": "wifi", "label": "board-openmv-ae3"},
              {"board": "OPENMV_RT1060", "network": "lan", "label": "board-openmv-rt1062"},
              {"board": "OPENMV_RT1060", "network": "wifi", "label": "board-openmv-rt1062"},
          ]
          board = os.environ.get("BOARD") or "all"
          sel = legs if board == "all" else [l for l in legs if l["board"] == board]
          print("matrix=" + json.dumps({"include": sel}))
          PY

  ota-cycle:
    name: ota-cycle ${{ matrix.board }} ${{ matrix.network }}
    needs: plan
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    runs-on: [self-hosted, hil, "${{ matrix.label }}"]
    # One board at a time; never cancel a running flash/cycle.
    concurrency:
      group: hil-ota-${{ matrix.label }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: OTA ${{ github.event.inputs.scenario || 'delta' }} + coverage trace
        env:
          OTA_SERVER: ${{ vars.HIL_OTA_SERVER }}
          OTA_TOKEN: ${{ secrets.HIL_OTA_TOKEN }}
          WIFI_SSID: ${{ secrets.HIL_WIFI_SSID }}
          WIFI_PASSWORD: ${{ secrets.HIL_WIFI_PASSWORD }}
        run: |
          # Run with the node's venv python (has pyserial + the openmv-ota tooling).
          "$HOME/ota-venv/bin/python" ci/hil/ota_cycle.py \
            --board "${{ matrix.board }}" \
            --network "${{ matrix.network }}" \
            --scenario "${{ github.event.inputs.scenario || 'delta' }}" \
            --target "${{ github.event.inputs.target || '1.1.0' }}" \
            --checkout "$GITHUB_WORKSPACE" \
            --trace "hil-trace-${{ matrix.board }}-${{ matrix.network }}-${{ github.event.inputs.scenario || 'delta' }}.json"

      - name: Upload trace
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hil-trace-${{ matrix.board }}-${{ matrix.network }}-${{ github.event.inputs.scenario || 'delta' }}
          path: hil-trace-${{ matrix.board }}-${{ matrix.network }}-${{ github.event.inputs.scenario || 'delta' }}.json

  # Fold every trace this run produced into a device-path coverage report + lcov. Runs on a
  # hosted runner (pure JSON+source processing, no hardware) after the bench jobs finish.
  coverage:
    name: device-path coverage
    needs: ota-cycle
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: hil-trace-*
          path: traces
          merge-multiple: true
      - name: Build HIL coverage report
        run: |
          python3 ci/hil/hil_coverage.py --traces traces \
            --md hil-coverage.md --lcov hil-coverage.info
          cat hil-coverage.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: hil-coverage
          path: |
            hil-coverage.md
            hil-coverage.info
