name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

# openmv latest. Set to a tag/40-char SHA to pin the firmware for reproducibility.
env:
  OPENMV_REF: master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 1) Unit tests + 100% coverage gate, on Linux and macOS.
  # ---------------------------------------------------------------------------
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (editable, with dev + server extras)
        # the server/ + client/ code is un-omitted from coverage, so its deps (fastapi, httpx,
        # pydantic-settings) must be importable for the 100% gate.
        run: pip install -e ".[dev,server]"

      - name: Run tests (pytest enforces --cov-fail-under=100)
        run: pytest --cov-report=xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: ${{ matrix.os }}

  # ---------------------------------------------------------------------------
  # 1b) The ECDSA verify C shim, compiled against the firmware's own mbedtls and
  #     exercised on the host (host signs / mbedtls verifies + gcov 100% of core).
  #     Needs only the mbedtls source, so it fetches that submodule chain, not the
  #     whole firmware. Crypto is OS-independent, so Linux is enough.
  # ---------------------------------------------------------------------------
  cshim:
    name: ecdsa C shim (host mbedtls)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (editable, with dev extras)
        run: pip install -e ".[dev]"

      - name: Fetch the firmware's mbedtls source
        run: |
          git clone --depth 1 https://github.com/openmv/openmv.git "$RUNNER_TEMP/openmv"
          git -C "$RUNNER_TEMP/openmv" submodule update --init lib/micropython
          # --recursive: mbedtls 3.6 generates sources (psa_crypto_driver_wrappers.h)
          # via its own `framework` submodule, so a non-recursive init can't build.
          git -C "$RUNNER_TEMP/openmv/lib/micropython" submodule update --init --recursive lib/mbedtls
          # The source generation needs jinja2 + jsonschema; install mbedtls's own
          # authoritative build requirements rather than guessing package names.
          pip install -r "$RUNNER_TEMP/openmv/lib/micropython/lib/mbedtls/scripts/basic.requirements.txt"

      - name: Run the C-shim test (mbedtls + gcov)
        env:
          OPENMV_FW: ${{ runner.temp }}/openmv
        run: pytest tests/build/test_ecdsa_verify_c.py -o addopts="" -q

  # ---------------------------------------------------------------------------
  # 1c) Run the real boot.py on actual MicroPython under QEMU (MPS2-AN500):
  #     every boot path (each reject reason + valid) plus the real vfs.rom_ioctl
  #     mount + FRONT/BACK slot selection. This covers what host tests can't --
  #     boot.py on MicroPython and the on-device mount. (mbedtls isn't built for
  #     the qemu port yet, so the signature step uses an injected verify; the
  #     ECDSA C core is covered by the 100%-gcov host test above.)
  # ---------------------------------------------------------------------------
  qemu:
    name: boot.py on MicroPython (QEMU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install openmv-ota + mpremote deps
        run: pip install -e ".[dev]" pyserial platformdirs

      - name: Install QEMU
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends qemu-system-arm

      - name: Check out openmv firmware (latest) + submodules
        run: |
          git clone https://github.com/openmv/openmv.git "$RUNNER_TEMP/openmv"
          git -C "$RUNNER_TEMP/openmv" checkout "$OPENMV_REF"
          git -C "$RUNNER_TEMP/openmv" submodule update --init --recursive

      - name: Use the SDK's bundled make
        run: |
          SDK_VERSION="$(cat "$RUNNER_TEMP/openmv/SDK_VERSION")"
          echo "$HOME/openmv-sdk-$SDK_VERSION/make" >> "$GITHUB_PATH"

      - name: Build the MPS2_AN500 + MPS3_AN547 firmware (the tool installs the SDK)
        run: |
          openmv-ota project new "$RUNNER_TEMP/mps" -f "$RUNNER_TEMP/openmv" \
            -b MPS2_AN500 -b MPS3_AN547 --install-sdk
          openmv-ota build firmware "$RUNNER_TEMP/mps" -b MPS2_AN500
          openmv-ota build firmware "$RUNNER_TEMP/mps" -b MPS3_AN547

      - name: Run the QEMU boot test (both emulator boards)
        run: python ci/qemu_boot_test.py --firmware "$RUNNER_TEMP/openmv"

  # ---------------------------------------------------------------------------
  # 2) Exercise the tool end to end on every board, on Linux and macOS:
  #    `project new` pegs the project, `--install-sdk` fetches the OpenMV SDK
  #    (pure-Python download), and the firmware build uses the toolchain bundled
  #    *inside that SDK* -- no external arm-gcc / make is installed here. Boards
  #    the tool can't serve must fail cleanly (asserted by the driver).
  # ---------------------------------------------------------------------------
  build:
    name: build ${{ matrix.board }} (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        board:
          - OPENMV2
          - OPENMV3
          - OPENMV4
          - OPENMV4P
          - OPENMVPT
          - OPENMV_RT1060
          - OPENMV_AE3
          - OPENMV_N6
          - ARDUINO_PORTENTA_H7
          - ARDUINO_GIGA
          - ARDUINO_NICLA_VISION
          - ARDUINO_NANO_33_BLE_SENSE
          - ARDUINO_NANO_RP2040_CONNECT
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install openmv-ota
        run: pip install -e .

      # The firmware build calls GNU `realpath --relative-to` / `stat -c%s`; macOS
      # ships the BSD versions, which reject those flags. The SDK provides the
      # compiler toolchain but not GNU coreutils, so install them and put their
      # un-prefixed (realpath/stat/readlink/...) front of PATH.
      - name: Install GNU coreutils (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install coreutils
          echo "$(brew --prefix coreutils)/libexec/gnubin" >> "$GITHUB_PATH"

      - name: Check out openmv firmware (latest) + submodules
        run: |
          git clone https://github.com/openmv/openmv.git "$RUNNER_TEMP/openmv"
          git -C "$RUNNER_TEMP/openmv" checkout "$OPENMV_REF"
          # --recursive: the board build needs micropython's *nested* submodules
          # (lwip, mbedtls, mynewt-nimble, cyw43-driver, ...), not just openmv's.
          # Full (not --depth 1): shallow recursive can't always fetch a submodule's
          # pinned commit when it isn't the remote's branch tip.
          git -C "$RUNNER_TEMP/openmv" submodule update --init --recursive

      - name: Use the SDK's bundled toolchain
        run: |
          # The firmware Makefile prepends the SDK's gcc / vela / stedgeai /
          # signing-tool dirs to PATH itself; only the top-level `make` it shells
          # out to needs finding here, so add the SDK's bundled make. The SDK is
          # installed by `project new --install-sdk` in the next step (a PATH
          # entry for a dir that exists by the time make runs is fine).
          SDK_VERSION="$(cat "$RUNNER_TEMP/openmv/SDK_VERSION")"
          echo "$HOME/openmv-sdk-$SDK_VERSION/make" >> "$GITHUB_PATH"

      - name: Build + verify ${{ matrix.board }} (tool installs the SDK)
        env:
          INSTALL_SDK: "1"
          WORKDIR: ${{ runner.temp }}/projects
        run: bash ci/build_boards.sh "$RUNNER_TEMP/openmv" "${{ matrix.board }}"
