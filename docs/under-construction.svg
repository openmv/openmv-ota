<svg xmlns="http://www.w3.org/2000/svg" width="960" height="120" viewBox="0 0 960 120" role="img" aria-label="Under Construction — this project is a work in progress">
  <defs>
    <!-- Diagonal yellow/black hazard stripes -->
    <pattern id="hazard" width="56" height="56" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="56" height="56" fill="#f9c000"/>
      <rect width="28" height="56" fill="#1a1a1a"/>
    </pattern>
  </defs>

  <!-- Outer hazard border -->
  <rect x="0" y="0" width="960" height="120" fill="url(#hazard)"/>

  <!-- Inner dark panel for the text -->
  <rect x="14" y="14" width="932" height="92" rx="8" fill="#1a1a1a"/>
  <rect x="14" y="14" width="932" height="92" rx="8" fill="none" stroke="#f9c000" stroke-width="3"/>

  <!-- Warning sign glyph -->
  <g transform="translate(70, 60)">
    <path d="M 0 -26 L 26 22 L -26 22 Z" fill="#f9c000" stroke="#1a1a1a" stroke-width="3" stroke-linejoin="round"/>
    <rect x="-4" y="-12" width="8" height="22" rx="3" fill="#1a1a1a"/>
    <circle cx="0" cy="16" r="4.5" fill="#1a1a1a"/>
  </g>

  <!-- Text -->
  <text x="510" y="56" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="bold" fill="#f9c000" letter-spacing="2">UNDER CONSTRUCTION</text>
  <text x="510" y="88" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" letter-spacing="1">This project is a work in progress — not yet ready for production use</text>
</svg>
